name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true
        type: string
      confirm:
        description: 'Type "deploy" to confirm'
        required: true
        type: string

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "Deployment not confirmed. Input was: ${{ github.event.inputs.confirm }}"
          exit 1

      - name: Validate version exists
        run: |
          echo "Deploying version ${{ github.event.inputs.version }} to production"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Deploy backend
        run: |
          echo "Deploying backend ${{ github.event.inputs.version }} to production..."

      - name: Deploy frontend
        run: |
          echo "Deploying frontend ${{ github.event.inputs.version }} to production..."

      - name: Health check
        run: |
          echo "Running health checks..."

      - name: Notify deployment
        run: |
          echo "Production deployment of ${{ github.event.inputs.version }} completed successfully"

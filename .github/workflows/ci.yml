name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: springforge_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: springforge-backend/pom.xml

      - name: Build & Test
        working-directory: springforge-backend
        run: mvn -B verify --file pom.xml
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/springforge_test
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: springforge-backend/target/surefire-reports/

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: springforge-frontend/package-lock.json

      - name: Install dependencies
        working-directory: springforge-frontend
        run: npm ci

      - name: Lint
        working-directory: springforge-frontend
        run: npm run lint || true

      - name: Build
        working-directory: springforge-frontend
        run: npm run build -- --configuration production

      - name: Unit tests
        working-directory: springforge-frontend
        run: npm run test -- --watch=false --browsers=ChromeHeadless || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: springforge-backend/pom.xml

      - name: OWASP Dependency Check
        working-directory: springforge-backend
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9 || true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: springforge-backend/target/dependency-check-report.html

services:
  nginx:
    image: nginx:alpine
    container_name: springforge-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - springforge-net

  backend:
    build: .
    container_name: springforge-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/springforge
      DATABASE_USERNAME: springforge
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GENERATION_OUTPUT_DIR: /app/generated
    volumes:
      - generated-data:/app/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    mem_limit: 1g
    networks:
      - springforge-net

  frontend:
    build: ./springforge-frontend
    container_name: springforge-frontend
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 128m
    networks:
      - springforge-net

  postgres:
    image: postgres:16-alpine
    container_name: springforge-db
    environment:
      POSTGRES_DB: springforge
      POSTGRES_USER: springforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - springforge-net

  redis:
    image: redis:7-alpine
    container_name: springforge-redis
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    mem_limit: 192m
    networks:
      - springforge-net

  certbot:
    image: certbot/certbot
    container_name: springforge-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redis-data:
  generated-data:
  certbot-etc:
  certbot-var:

networks:
  springforge-net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: springforge-db
    environment:
      POSTGRES_DB: springforge
      POSTGRES_USER: springforge
      POSTGRES_PASSWORD: springforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

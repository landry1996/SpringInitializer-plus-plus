apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: springforge-ingress
  namespace: springforge
  labels:
    app.kubernetes.io/name: springforge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: "springforge-backend-service"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - springforge.io
        - api.springforge.io
      secretName: springforge-tls
  rules:
    - host: springforge.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: springforge-frontend-service
                port:
                  number: 80
    - host: api.springforge.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: springforge-backend-service
                port:
                  number: 8080

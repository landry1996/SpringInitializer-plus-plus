apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: springforge-backend-hpa
  namespace: springforge
  labels:
    app.kubernetes.io/name: springforge-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: springforge-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: springforge-frontend-hpa
  namespace: springforge
  labels:
    app.kubernetes.io/name: springforge-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: springforge-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: springforge-alerts
  namespace: springforge
  labels:
    release: prometheus
    app.kubernetes.io/name: springforge
spec:
  groups:
    - name: springforge.availability
      rules:
        - alert: BackendDown
          expr: up{job="springforge-backend"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "SpringForge backend is down"
            description: "Backend instance {{ $labels.instance }} has been unreachable for more than 2 minutes."

        - alert: HighErrorRate
          expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate detected"
            description: "More than 5% of requests are failing with 5xx errors."

        - alert: HighResponseTime
          expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High response time (p95 > 2s)"
            description: "95th percentile response time is above 2 seconds."

    - name: springforge.resources
      rules:
        - alert: HighMemoryUsage
          expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "JVM heap memory usage is high"
            description: "Heap memory usage is above 85% on {{ $labels.instance }}."

        - alert: HighCPUUsage
          expr: process_cpu_usage > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage"
            description: "CPU usage is above 80% for more than 10 minutes."

        - alert: DatabaseConnectionPoolExhausted
          expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Database connection pool near exhaustion"
            description: "Active connections are at 90% of max pool size."

    - name: springforge.business
      rules:
        - alert: GenerationFailureRate
          expr: rate(springforge_generation_errors_total[10m]) / rate(springforge_generation_total[10m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High project generation failure rate"
            description: "More than 10% of project generations are failing."

        - alert: KafkaConsumerLag
          expr: kafka_consumer_lag_sum > 1000
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Kafka consumer lag is high"
            description: "Consumer lag has exceeded 1000 messages for 10 minutes."

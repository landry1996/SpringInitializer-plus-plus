apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: springforge
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: 'warning'
          repeat_interval: 4h

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://springforge-backend-service:8080/api/v1/webhooks/alerts'
            send_resolved: true

      - name: 'critical'
        webhook_configs:
          - url: 'http://springforge-backend-service:8080/api/v1/webhooks/alerts'
            send_resolved: true

      - name: 'warning'
        webhook_configs:
          - url: 'http://springforge-backend-service:8080/api/v1/webhooks/alerts'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname']

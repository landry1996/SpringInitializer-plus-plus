spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/springforge}
    username: ${DATABASE_USERNAME:springforge}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  jpa:
    show-sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:}
    consumer:
      auto-startup: ${KAFKA_ENABLED:false}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:}

server:
  port: ${PORT:8080}

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: 900000
    refresh-token-ttl: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS}
  generation:
    output-dir: ${GENERATION_OUTPUT_DIR:/app/generated}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
  keycloak:
    enabled: ${KEYCLOAK_ENABLED:false}
  billing:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      pro-price-id: ${STRIPE_PRO_PRICE_ID:}
      enterprise-price-id: ${STRIPE_ENTERPRISE_PRICE_ID:}
    frontend-url: ${CORS_ORIGINS:http://localhost:4200}

storage:
  type: ${STORAGE_TYPE:filesystem}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:springforge-generations}

ai:
  provider: ${AI_PROVIDER:claude}
  claude:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${AI_MODEL:claude-sonnet-4-20250514}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${AI_MODEL:gpt-4o}

notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
    from: ${EMAIL_FROM:notifications@springforge.io}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    enabled: false

logging:
  level:
    com.springforge: WARN
    AUDIT: INFO
    root: WARN

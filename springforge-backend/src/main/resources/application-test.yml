spring:
  datasource:
    url: jdbc:h2:mem:springforge-test;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS SPRINGFORGE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        default_schema: springforge
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

app:
  jwt:
    secret: test-secret-must-be-at-least-64-characters-long-for-hs512-algorithm-testing-only
    access-token-ttl: 900000
    refresh-token-ttl: 604800000
  cors:
    allowed-origins: http://localhost:4200
  generation:
    output-dir: ./target/generated-test
    max-concurrent: 2

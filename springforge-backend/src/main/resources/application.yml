spring:
  application:
    name: springforge
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: springforge
  flyway:
    enabled: true
    schemas: springforge
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-must-be-at-least-64-characters-long-for-hs512-algorithm}
    access-token-ttl: 900000
    refresh-token-ttl: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  generation:
    output-dir: ${GENERATION_OUTPUT_DIR:./generated}
    max-concurrent: 5

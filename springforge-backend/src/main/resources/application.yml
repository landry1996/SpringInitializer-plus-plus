spring:
  application:
    name: springforge
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: springforge
  flyway:
    enabled: true
    schemas: springforge
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-must-be-at-least-64-characters-long-for-hs512-algorithm}
    access-token-ttl: 900000
    refresh-token-ttl: 604800000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  generation:
    output-dir: ${GENERATION_OUTPUT_DIR:./generated}
    max-concurrent: 5
  billing:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      pro-price-id: ${STRIPE_PRO_PRICE_ID:}
      enterprise-price-id: ${STRIPE_ENTERPRISE_PRICE_ID:}
    frontend-url: ${BILLING_FRONTEND_URL:http://localhost:4200}
  storage:
    type: ${STORAGE_TYPE:filesystem}
    retention-days: ${STORAGE_RETENTION_DAYS:30}
    filesystem:
      base-dir: ${STORAGE_DIR:./generated}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:springforge-generations}
      presigned-url-expiry: ${MINIO_URL_EXPIRY:86400}
